services:
  postgres:
    image: postgres:16-alpine
    container_name: mms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mms_password}
      POSTGRES_DB: ${POSTGRES_DB:-mms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mms} -d ${POSTGRES_DB:-mms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mms-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mms}:${POSTGRES_PASSWORD:-mms_password}@postgres:5432/${POSTGRES_DB:-mms}?schema=public
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:${WEB_PORT:-3000}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}
    container_name: mms-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
